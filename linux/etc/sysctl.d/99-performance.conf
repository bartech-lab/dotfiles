# Memory: reduce swap aggressiveness (64GB RAM -- swap is almost never needed)
vm.swappiness=10

# Gaming: raised memory map limit for Proton/Wine compatibility
# Kernel default is 65530; Arch sets 1048576 via /usr/lib/sysctl.d/10-arch.conf
# We pin it explicitly here so it survives regardless of upstream changes
vm.max_map_count=1048576
