# Safety blacklist: prevent nouveau and nova_core from loading
# nvidia-utils also does this, but explicit is safer for early boot
blacklist nouveau
blacklist nova_core
blacklist nova_drm

# DRM kernel mode setting (required for Wayland)
# Enabled by default since nvidia-utils 560.35.03-5, but pinned explicitly
options nvidia_drm modeset=1 fbdev=1
